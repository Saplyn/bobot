name: Deploy Bobot Compute

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_DIR: bobot/compute

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bobot-compute-build-files"
          cache-on-failure: true

      - name: Add Rust Nightly Component
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build & Deploy to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: ${{ env.PROJECT_DIR }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: bun
          wranglerVersion: latest
          command: >
            deploy --message 'Deployed on GitHub Action
            by ${{ github.actor }}
            from ${{ github.repository }}:${{ github.sha }}
            - ${{ github.event.head_commit.message }}'
