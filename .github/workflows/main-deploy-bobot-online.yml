name: Deploy Bobot Online

on:
  workflow_dispatch:
  push:
    paths:
      - bobot/online/**
      - package.json
      - bun.lock
    branches:
      - main

env:
  PROJECT_DIR: bobot/online/

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build application
        run: bun run build --preset github_pages
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ${{ env.PROJECT_DIR }}/.output/public

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: bobot-online
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
