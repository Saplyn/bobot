name: Build Bobot Online

on:
  workflow_dispatch:
  push:
    branches:
      - dev

env:
  PROJECT_DIR: bobot/online

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build Application
        run: bun run build --preset github_pages
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}
