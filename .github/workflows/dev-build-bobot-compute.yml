name: Build Bobot Compute

on:
  workflow_dispatch:
  push:
    branches:
      - dev

env:
  PROJECT_DIR: bobot/compute

jobs:
  build:
    name: Build & Dry Run Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: bobot-compute
          shared-key: build-files
          add-job-id-key: false
          add-rust-environment-hash-key: false
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Add Rust Nightly Component
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build & Dry Run Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: ${{ env.PROJECT_DIR }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: latest
          packageManager: bun
          command: >
            deploy --dry-run --message "Deployed on GitHub Action
            by ${{ github.actor }}
            from ${{ github.repository }}:${{ github.sha }}
            - ${{ github.event.head_commit.message }}"
