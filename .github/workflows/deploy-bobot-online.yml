name: Deploy Bobot Online

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_DIR: bobot/online

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build Application
        run: bun run build --preset github_pages
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ env.SUPABASE_KEY }}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ${{ env.PROJECT_DIR }}/.output/public

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
