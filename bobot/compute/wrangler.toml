#:schema ../../node_modules/wrangler/config-schema.json

name = "bobot"
main = "build/index.js"
compatibility_date = "2026-04-12"

[build]
command = "cargo install \"worker-build@^0.8\" && worker-build --release --panic-unwind"

[[routes]]
pattern = "bobot.saplyn.site"
custom_domain = true

[observability.logs]
enabled = true
head_sampling_rate = 1.00
