#:schema ../../node_modules/wrangler/config-schema.json

name = "bobot-oauth"
main = "build/index.js"
compatibility_date = "2026-05-02"
workers_dev = false

[build]
command = "cargo install worker-build && worker-build --profile=wasm-release --panic-unwind"

[[routes]]
zone_name = "saplyn.site"
pattern = "oauth.bobo.saplyn.site"
custom_domain = true

[observability.logs]
enabled = true
invocation_logs = false
head_sampling_rate = 1.00

[observability.traces]
enabled = true
head_sampling_rate = 1.00

[secrets]
required = ["QQ_OAUTH_ID", "QQ_OAUTH_SECRET"]

[[d1_databases]]
binding = "BOBOT_STATEFUL"
database_name = "bobot-stateful"
database_id = "39a165b6-ca4d-4837-81ef-e312a4d05b4c"
migrations_dir = "../stateful/"
